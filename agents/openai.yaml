interface:
  display_name: "Unity MCP Validator"
  version: "2.0.0"
  short_description: "Route Unity changes to validation flow via Unity-MCP — v2.0 with async wait, UI snapshots, state reset, and JSON output."
  default_prompt: "Use $unity-mcp-validator to decide and execute the correct validation flow for this Unity change using Unity-MCP tools."
  capabilities:
    - "Classify Unity changes by type (model, controller, input, animation, scene, UI, settings)"
    - "Route to appropriate validation layers (static, EditMode, Editor, PlayMode)"
    - "Execute runtime probes via reflection-method-call"
    - "Run dynamic C# code via script-execute (Roslyn)"
    - "Collect evidence (screenshots, logs, state snapshots, UI DOM snapshots)"
    - "Report with explicit verdicts and blockers (Markdown + JSON dual output)"
    - "Wait for async state transitions (wait-until-condition, wait-for-animation-state) [v2.0]"
    - "Assert UI state via DOM tree snapshots (ui-hierarchy-snapshot) [v2.0]"
    - "Reset game state between test cases (state-reset) [v2.0]"
    - "Construct boundary test scenarios via test backdoor API [v2.0]"
    - "Output machine-consumable JSON validation reports [v2.0]"
  dependencies:
    - name: "Unity-MCP"
      url: "https://github.com/IvanMurzak/Unity-MCP"
      required: true
  config_file: "validation-config.yaml"
